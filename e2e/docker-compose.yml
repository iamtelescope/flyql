name: flyql-e2e

services:
  clickhouse:
    image: clickhouse/clickhouse-server:${CLICKHOUSE_VERSION:-24.8}
    ports:
      - "19000:9000"
      - "18123:8123"
    environment:
      CLICKHOUSE_USER: flyql
      CLICKHOUSE_PASSWORD: flyql
      CLICKHOUSE_DB: default
    volumes:
      - ../tests-data/e2e/clickhouse/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ../tests-data/e2e/clickhouse/join_init.sql:/docker-entrypoint-initdb.d/02_join_init.sql
    tmpfs:
      - /var/lib/clickhouse
    healthcheck:
      test: ["CMD", "clickhouse-client", "--user=flyql", "--password=flyql", "--query", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 12

  starrocks:
    image: starrocks/allin1-ubuntu:${STARROCKS_VERSION:-3.3-latest}
    ports:
      - "19030:9030"
      - "18030:8030"
      - "18040:8040"
    volumes:
      - ../tests-data/e2e/starrocks/init.sql:/opt/starrocks/init.sql
      - ../tests-data/e2e/starrocks/join_init.sql:/opt/starrocks/join_init.sql
    tmpfs:
      - /opt/starrocks/fe/meta
      - /opt/starrocks/be/storage
    healthcheck:
      test: ["CMD-SHELL", "mysql -h 127.0.0.1 -P 9030 -u root --skip-column-names -e 'SHOW BACKENDS' 2>/dev/null | awk -F'\\t' '{print $9}' | grep -q true"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  postgresql:
    image: postgres:${POSTGRESQL_VERSION:-16}
    ports:
      - "15432:5432"
    environment:
      POSTGRES_USER: flyql
      POSTGRES_PASSWORD: flyql
      POSTGRES_DB: flyql_test
    volumes:
      - ../tests-data/e2e/postgresql/init.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ../tests-data/e2e/postgresql/join_init.sql:/docker-entrypoint-initdb.d/02_join_init.sql
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flyql -d flyql_test"]
      interval: 5s
      timeout: 5s
      retries: 12
