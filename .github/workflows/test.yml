name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  error-registry:
    name: Error registry codegen up-to-date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: false
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Install formatters
        run: |
          python -m pip install --upgrade pip
          pip install black==25.1.0
      - name: Install prettier (pinned devDependency)
        working-directory: javascript/packages/flyql
        run: npm ci
      - name: Regenerate error registry
        run: make generate-errors
      - name: Verify checked-in generated files match registry
        run: |
          git diff --exit-code -- \
            errors/registry.json \
            python/flyql/errors_generated.py \
            javascript/packages/flyql/src/errors_generated.js \
            golang/errors_generated.go \
            golang/errors_generated_test.go \
            golang/columns/errors_generated.go \
            golang/columns/errors_generated_test.go \
            || { echo "::error::Error registry is out of date. Run \`make generate-errors\` and commit the result."; exit 1; }

  python:
    name: Python tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.12']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Test
        working-directory: python
        run: make install test

  javascript:
    name: JavaScript tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Test
        working-directory: javascript
        run: make install test

  golang:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: false
      - name: Test
        working-directory: golang
        run: make install test
