name: E2E Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      flyql_version:
        description: 'FlyQL version to test (leave empty for local source)'
        required: false
        default: ''
      clickhouse_version:
        description: 'ClickHouse version'
        required: false
        default: '25.12'
      postgresql_version:
        description: 'PostgreSQL version'
        required: false
        default: '16'
      starrocks_version:
        description: 'StarRocks version'
        required: false
        default: '3.3-latest'
      publish:
        description: 'Publish report to GitHub Pages'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: e2e
  cancel-in-progress: true

jobs:
  e2e:
    name: E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: false

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install FlyQL from package managers
        if: ${{ inputs.flyql_version != '' }}
        env:
          FLYQL_VERSION: ${{ inputs.flyql_version }}
        run: |
          echo "Installing FlyQL v${FLYQL_VERSION} from package managers"

          cd python && python3 -m venv .venv && .venv/bin/pip install "flyql==${FLYQL_VERSION}" && .venv/bin/pip install pytest && cd ..
          for f in python/e2e/test_*.py; do
            sed -i '/sys.path.insert/d' "$f"
          done

          # Swap the workspace flyql dep in the javascript root package.json for the
          # published version so pnpm resolves javascript/node_modules/flyql from the
          # npm registry. The e2e test files use bare 'flyql/*' specifiers, so no
          # source rewrites are needed — they naturally pick up whichever flyql is
          # installed at javascript/node_modules/flyql.
          node -e '
            const fs = require("fs");
            const path = "javascript/package.json";
            const pkg = JSON.parse(fs.readFileSync(path, "utf8"));
            pkg.devDependencies.flyql = "^" + process.env.FLYQL_VERSION;
            fs.writeFileSync(path, JSON.stringify(pkg, null, 4) + "\n");
          '
          cd javascript && pnpm install --no-frozen-lockfile && cd ..

          cd golang/e2e
          sed -i '/^replace /d' go.mod
          go get "github.com/iamtelescope/flyql/golang@v${FLYQL_VERSION}"
          go mod tidy
          cd ../..

      - name: Install FlyQL from local source
        if: ${{ inputs.flyql_version == '' }}
        run: |
          cd python && python3 -m venv .venv && .venv/bin/pip install -e . && .venv/bin/pip install pytest
          cd ../javascript && pnpm install --frozen-lockfile

      - name: Install E2E dependencies
        run: cd e2e && make install

      - name: Write version file
        env:
          CLICKHOUSE_VERSION: ${{ inputs.clickhouse_version || '25.12' }}
          POSTGRESQL_VERSION: ${{ inputs.postgresql_version || '16' }}
          STARROCKS_VERSION: ${{ inputs.starrocks_version || '3.3-latest' }}
        run: |
          cat > e2e/versions/ci.env <<EOF
          CLICKHOUSE_VERSION=${CLICKHOUSE_VERSION}
          POSTGRESQL_VERSION=${POSTGRESQL_VERSION}
          STARROCKS_VERSION=${STARROCKS_VERSION}
          EOF

      - name: Run E2E tests
        run: cd e2e && VERSION_FILE=versions/ci.env make run

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report
          path: e2e/output/report.json

      - name: Prepare Pages artifact
        if: ${{ inputs.publish }}
        run: |
          mkdir -p pages
          cp e2e/output/report.json pages/e2e-report.json

      - name: Upload Pages artifact
        if: ${{ inputs.publish }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages/

  deploy:
    name: Publish report
    if: ${{ inputs.publish }}
    needs: e2e
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
