name: publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.0.1). Must match versions in pyproject.toml and package.json and has no tag with this version.'
        required: true
        type: string

jobs:
  validate:
    name: Validate version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true

      - name: Validate version
        env:
          VERSION: ${{ inputs.version }}
        run: python3 .github/scripts/validate_version.py "$VERSION"

  python:
    name: Publish Python to PyPI
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Build package
        working-directory: python
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist/

  javascript:
    name: Publish JavaScript to npm
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        working-directory: javascript
        run: pnpm install --frozen-lockfile

      - name: Publish to npm
        working-directory: javascript
        run: npm publish --access public

  golang:
    name: Tag Go modules
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Create and push tags
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag "v${VERSION}"
          git tag "golang/v${VERSION}"
          git tag "cli/v${VERSION}"

          git push origin "v${VERSION}"
          git push origin "golang/v${VERSION}"
          git push origin "cli/v${VERSION}"
