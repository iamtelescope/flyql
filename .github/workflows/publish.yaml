name: Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.0.1). Must match versions in pyproject.toml and package.json and has no tag with this version.'
        required: true
        type: string
      target:
        description: 'What to publish'
        required: true
        type: choice
        default: all
        options:
          - all
          - validate
          - python
          - javascript
          - golang

permissions: {}

jobs:
  validate-python:
    name: Validate Python
    if: inputs.target == 'all' || inputs.target == 'validate' || inputs.target == 'python'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Validate
        env:
          VERSION: ${{ inputs.version }}
        run: python3 .github/scripts/validate_version.py "$VERSION" python

  validate-javascript:
    name: Validate JavaScript
    if: inputs.target == 'all' || inputs.target == 'validate' || inputs.target == 'javascript'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Validate
        env:
          VERSION: ${{ inputs.version }}
        run: python3 .github/scripts/validate_version.py "$VERSION" javascript

  validate-golang:
    name: Validate Go
    if: inputs.target == 'all' || inputs.target == 'validate' || inputs.target == 'golang'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true
      - name: Validate
        env:
          VERSION: ${{ inputs.version }}
        run: python3 .github/scripts/validate_version.py "$VERSION" golang

  python:
    name: Publish Python to PyPI
    needs: validate-python
    if: inputs.target == 'all' || inputs.target == 'python'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Build package
        working-directory: python
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist/

  flyql:
    name: Publish flyql to npm
    needs: validate-javascript
    if: inputs.target == 'all' || inputs.target == 'javascript'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@^11.5.1

      - name: Install dependencies
        working-directory: javascript
        run: pnpm install

      - name: Publish flyql to npm
        working-directory: javascript/packages/flyql
        run: pnpm publish --access public --no-git-checks

  flyql-vue:
    name: Publish flyql-vue to npm
    needs: flyql
    if: inputs.target == 'all' || inputs.target == 'javascript'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@^11.5.1

      - name: Install dependencies
        working-directory: javascript
        run: pnpm install

      - name: Publish flyql-vue to npm
        working-directory: javascript/packages/flyql-vue
        run: pnpm publish --access public --no-git-checks

  golang:
    name: Tag Go modules
    needs: validate-golang
    if: inputs.target == 'all' || inputs.target == 'golang'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Create and push tags
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag "v${VERSION}"
          git tag "golang/v${VERSION}"
          git tag "cli/v${VERSION}"

          git push origin "v${VERSION}"
          git push origin "golang/v${VERSION}"
          git push origin "cli/v${VERSION}"
