name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go:
    name: Go Tests & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Check formatting
        run: |
          cd golang
          test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)
      - name: Vet
        run: cd golang && go vet ./...
      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest
      - name: Staticcheck
        run: cd golang && staticcheck ./...
      - name: Build
        run: cd golang && go build ./...
      - name: Run tests
        run: cd golang && go test -v ./...

  python:
    name: Python Tests & Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          cd python
          pip install -e .
          pip install pytest black mypy
      - name: Check formatting
        run: cd python && black --check .
      - name: Type check
        run: cd python && mypy flyql/ --strict
      - name: Run tests
        run: cd python && pytest tests/ -v

  javascript:
    name: JavaScript Tests & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Install dependencies
        run: cd javascript && pnpm install
      - name: Check formatting
        run: cd javascript && pnpm format --check
      - name: Lint
        run: cd javascript && pnpm lint
      - name: Run tests with coverage
        run: cd javascript && pnpm test:coverage
